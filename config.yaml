# ===========================
# === Main logic switches ===
# ===========================
run_steps:
  # Dataset preparation
  build_database: false # Build the database of Bekanntmachungen by scraping the BMBF website
  build_sft_dataset: false # Build the training database with relevant document chunks for each prompt in the training data
  split_train_test: false # Split the training and testing sets for supervised fine-tuning using HuggingFace
  check_database_quality: false # NOTE: not implemented yet
  create_ground_truth: false # NOTE: not implemented yet
  # RAG
  build_structured_database: false # Build a structured database of text chunks from the Bekanntmachungen documents
  add_topic_tags: false # Add topic tags to the structured database of text chunks
  build_chromadb: false # Build a ChromaDB vector database from the structured database of text chunks
  run_vector_rag: false # Run vector RAG information extraction on all documents in the data folder
  # Graph RAG
  build_graph_database: false # Build the database of entities and relationships leveraging the chunk database to build a graph RAG
  split_graph_database: false # Split conjunction triplets (e.g. "Agency A und Agency B") into individual triplets before canonicalisation
  canonicalise_graph_database: false # Canonicalise entity surface forms in the graph database by clustering semantically similar values
  filter_graph_database: false # Remove triplets with structurally invalid entity values (dates, URLs, purely numeric, overly long descriptions)
  build_knowledge_graph: false # Assemble filtered triplets into a NetworkX knowledge graph and serialise it to disk
  detect_communities: false # Partition the knowledge graph into communities using the Louvain algorithm
  summarise_communities: false # Generate a textual summary for each community (template for small, LLM for large)
  run_graph_rag: false # Run graph RAG information extraction on all documents in the data folder
  # Evaluation
  compute_huggingface_inferences: false # Get inferences from a HuggingFace model given a labelled dataset
  compute_traditional_metrics: true # Compute the BLEU, ROUGE and BertScore evaluation metrics between content generated by an agent and ground truth
  plot_traditional_metrics: true # Plot box plots and violin plots of the traditional evaluation metrics
  run_llm_as_judge: false # Run LLM-as-a-judge evaluation
  compute_overall_llm_judge_scores: false # Compute overall LLM-as-a-judge scores using the criteria specific scores
  compute_spearman_correlations: false # Compute the Spearman's Rank Correlation Coefficient between LLM judge and human assigned scores 


# ===========================
# === Reusable variables ===
# ===========================
vars:
  agent_model: &agent_model 'fine-tuned-mistral7b-instruct'
  llm_judge: &llm_judge 'llama3-70b-8192'
  
# --- Configuration for each step ---
# TODO: complete with the other steps later on

# ==================================
# === Database Building Settings ===
# ==================================
build_database:
  bmbf_base_url: "https://www.bmbf.de" # Base URL of the BMBF website
  bmbf_search_url: "https://www.bmbf.de/SiteGlobals/Forms/Suche/Bekanntmachungsuche/Bekanntmachungsuche_Formular.html?resourceId=1051612&pageLocale=de&input_=917290&gtp=1051594_list%253D1&resultsPerPage=50" # URL of the page listing Bekanntmachungen
  url_file: './meta_data/bekanntmachung_links.txt' # File of all Bekanntmachung URLs to be processed
  output_dir: './data/' # Directory where the extracted text files will be saved
  min_delay_seconds: 1 # Minimum and maximum delay in seconds between requests not to overload the server
  max_delay_seconds: 1.5
  log_file: './meta_data/failed_content_urls.txt' # File where logs of failed URLs will be saved

build_sft_dataset:
  data_folder: 'evaluation\data' # Folder containing the original data files in text or pdf format
  ground_truth_filepath: 'evaluation\ground_truth' # Folder containing the associated ground truth files in json format
  prompts_filepath: 'prompts\agent_prompts.json' # Json file containing the prompts
  output_filepath: 'supervised_fine_tuning\dataset.json' # Path where to save the resulting json file
  embedding_model_name: 'models/embedding-001' # Name of the embedding model to be used
  chunk_size: 4000 # Size of the text chunks to be created from the document
  chunk_overlap: 200 # Overlap between the text chunks 
  top_k_retrieval: 4 # Number of top relevant chunks to retrieve for each query

split_train_test:
  database_path: 'supervised_fine_tuning\dataset.json' # Path to the json file containing the dataset as formatted by Langchain
  training_set_path: 'supervised_fine_tuning\train_dataset.csv' # Path where to save the training set in CSV format
  testing_set_path: 'supervised_fine_tuning\test_dataset.csv' # Path where to save the testing set in CSV format
  train_proportion: 0.7 # Proportion of the dataset to be used for training
  random_seed: 42 # Seed for the random split

build_structured_database:
  data_folder_path: 'data' # Path to the folder containing the text files to be processed
  chunk_size: 4000 # Size of the text chunks to be created from the document
  chunk_overlap: 150 # Overlap between the text chunks
  output_path: &structured_database_path 'graph_rag/structured_database.jsonl' # Path where to save the resulting jsonl file
  clean_text: true # Whether to apply text cleaning heuristics to each chunk
  add_tags: true # Whether to add html style tags to indicate relevant information such as emails, phone numbers, amounts, dates

add_topic_tags:
  database_path: *structured_database_path # Path to the jsonl file containing the structured database of chunks
  output_path: 'graph_rag/structured_database_with_topics.jsonl' # Path where to save the resulting jsonl file

build_graph_database:
  database_path: 'graph_rag/structured_database_truncated.jsonl' # Path to the jsonl file containing the structured database of chunks
  output_path: 'graph_rag/graph_database_truncated_v11.jsonl' # Path where to save the resulting jsonl file
  llm_name: 'gemini-2.5-flash' # Name of the LLM to be used for concept extraction
  prompt_filepath: 'prompts/graph_rag_entity_extraction.json' # Path to the json file containing the prompt
  chunk_batch: 4 # Number of chunks with at least one associated topic to be provided at once to the LLM
  temperature: 0 # Temperature parameter for the LLM

split_graph_database:
  input_path: 'graph_rag/graph_database_full.jsonl' # Path to the raw graph database of triplets
  output_path: 'graph_rag/graph_database_split.jsonl' # Path where the expanded graph database should be saved
  entity_types_to_split: ['FUNDING_BODY', 'APPLICANT', 'PERSON', 'LOCATION'] # Entity types for which conjunction values should be split
  conjunction_markers: [' und ', ' and ', ' sowie '] # Substrings used to detect and split conjunction values
  min_part_words: 2 # Minimum words per part for a split to apply (guards against splitting legitimate "und" in institution names)

canonicalise_graph_database:
  input_path: 'graph_rag/graph_database_split.jsonl' # Path to the split graph database (output of split_graph_database step)
  output_path: 'graph_rag/graph_database_canonicalised.jsonl' # Path where the canonicalised graph database should be saved
  mapping_output_path: 'graph_rag/canonicalisation_mapping.json' # Path where the canonicalisation mapping should be saved for inspection
  embedding_model_path: 'sentence-transformers/paraphrase-multilingual-mpnet-base-v2' # Sentence-transformer model used to embed entity surface forms
  similarity_threshold: 0.65 # Cosine similarity above which two surface forms are merged (lower = more aggressive merging)
  token_overlap_threshold: 0.5 # Jaccard token similarity above which two forms are merged regardless of embedding distance
  department_separators: [' – ', ' - ', ' ('] # Substrings used to strip department/role suffixes (e.g. "DLR – Abt. X" -> "DLR", "Person A (contact)" -> "Person A")
  conjunction_markers: [' und ', ' and ', ' sowie '] # Substrings indicating a value lists multiple entities; such values are kept verbatim
  entity_types_normalise_only: ['PERSON'] # Entity types that get suffix stripping only (no clustering), to avoid false-positive merges between different people
  entity_types_to_canonicalise: ['FUNDING_BODY', 'APPLICANT', 'LOCATION'] # Entity types that get the full normalisation + clustering pipeline
  manual_overrides: # Hard-coded mappings applied after automated clustering; takes precedence over all other canonicalisation
    FUNDING_BODY:
      "Bundesministerium für Bildung": "BMBF"
      "Bundesministerium für Bildung und Forschung": "BMBF"
      "Forschung": "BMBF"

filter_graph_database:
  input_path: 'graph_rag/graph_database_canonicalised.jsonl' # Path to the canonicalised graph database (output of canonicalise_graph_database step)
  output_path: 'graph_rag/graph_database_filtered.jsonl' # Path where the filtered graph database should be saved
  rejected_output_path: 'graph_rag/graph_database_rejected.jsonl' # Path where rejected triplets should be saved for inspection
  entity_types_to_filter: ['APPLICANT', 'FUNDING_BODY', 'PERSON', 'LOCATION'] # Entity types to validate; structural types (DOCUMENT, SECTION) are always skipped
  max_words: 40 # Values with more than this many words are treated as descriptions rather than entity names

build_knowledge_graph:
  input_path: 'graph_rag/graph_database_filtered.jsonl' # Path to the filtered graph database (output of filter_graph_database step)
  output_path: 'graph_rag/knowledge_graph.pkl' # Path where the serialised NetworkX graph should be saved
  directed: true # Whether to build a directed graph (True) or undirected (False)

detect_communities:
  input_path: 'graph_rag/knowledge_graph.pkl' # Path to the pickled knowledge graph (updated in-place with community_id attributes)
  communities_output_path: 'graph_rag/communities.json' # Path where per-community node+edge data is saved for summarisation
  resolution: 1.0 # Louvain resolution parameter: higher value -> more, smaller communities
  seed: 42 # Random seed for reproducibility

summarise_communities:
  communities_path: 'graph_rag/communities.json' # Path to the communities JSON (output of detect_communities)
  output_path: 'graph_rag/community_summaries.json' # Path where the community summaries should be saved
  llm_name: 'gemini-2.5-flash' # Gemini model to use for summarisation
  temperature: 0 # LLM temperature
  min_size_for_llm: 5 # Communities smaller than this use a template summary (no LLM call)
  max_nodes_per_summary: 50 # Maximum nodes sent to the LLM per community (top by frequency)
  max_edges_per_summary: 100 # Maximum edges sent to the LLM per community (top by weight)

build_chromadb:
  database_path: 'graph_rag/structured_database_with_topics.jsonl' # Path to the jsonl file containing the structured database of chunks
  chroma_db_path: 'chroma_db' # Path where to save the ChromaDB database
  embedding_model_path: 'sentence-transformers/paraphrase-multilingual-mpnet-base-v2' # Path to the embedding model to be used
  batch_size: 500 # Number of database entries to process in each batch


# ===========================
# === RAG Agent Settings ===
# ===========================
vector_rag:
  data_folder: 'evaluation/data' # Folder containing the Bekanntmachungen text files to process
  prompts_filepath: 'prompts/agent_prompts.json' # Path to the prompts JSON file
  output_path: 'evaluation/generated_outputs/vector_rag_gemini-2.5-flash' # Folder where extracted JSON files are saved
  model_name: 'gemini-2.5-flash' # Gemini model name
  temperature: 0.1 # LLM temperature
  max_tokens: 4096 # Maximum tokens to generate per query
  chunk_size: 4000 # Size of text chunks for the in-memory vector store
  chunk_overlap: 20 # Overlap between consecutive chunks

graph_rag:
  data_folder: 'evaluation/data' # Folder containing the Bekanntmachungen text files to process
  knowledge_graph_path: 'graph_rag/knowledge_graph.pkl' # Path to the serialised NetworkX knowledge graph
  structured_database_path: 'graph_rag/structured_database_with_topics.jsonl' # Path to the structured chunk database (for raw text lookup)
  community_summaries_path: 'graph_rag/community_summaries.json' # Path to the community summaries JSON
  prompts_filepath: 'prompts/agent_prompts.json' # Path to the prompts JSON file
  output_path: 'evaluation/generated_outputs/graph_rag_gemini-2.5-flash' # Folder where extracted JSON files are saved
  model_name: 'gemini-2.5-flash' # Gemini model name
  temperature: 0.1 # LLM temperature
  max_tokens: 4096 # Maximum tokens to generate per query
  top_k_communities: 3 # Number of top communities to retrieve for broad topics
  embedding_model_name: 'paraphrase-multilingual-mpnet-base-v2' # Sentence-transformers model for community summary retrieval

# =============================
# === HuggingFace Settings ===
# =============================
compute_huggingface_inferences:
  dataset_path: 'supervised_fine_tuning/test_dataset.csv' # Path to the CSV file containing the dataset to be used for inference
  model_name: 'frederic-li-hanchen/bekanntmachung-llm-v1' # Name of the model to use for inference | base Mistral-7B-Instruct-v0.2-GGUF: 'TheBloke/Mistral-7B-Instruct-v0.2-GGUF'
  output_dir: 'supervised_fine_tuning/test_inference_fine_tuning' # Path where to save the inferences in json format, one per file
  max_new_tokens: 1024 # Maximum number of tokens for the inference
  autotrain_base_model_name: 'mistralai/Mistral-7B-Instruct-v0.2' # Base model name to be used if the model is from AutoTrain

# =================================
# === Agent Evaluation Settings ===
# =================================
evaluation_shared_paths:
  gt_path: &gt_path './evaluation/ground_truth' # Path to the folder containing the json files with the ground truth
  gen_path: &gen_path './evaluation/generated_outputs/graph_rag_gemini-2.5-flash' # Path to the folder containing the json files with the agent generated information
  traditional_metrics_csv_file: &traditional_metrics_csv_path './evaluation/metrics/graph_rag_gemini-2.5-flash/metrics.csv' # Path to the CSV file where to save the BLEU, ROUGE and BertScore evaluation metrics
  llm_scores_csv_filepath: &llm_scores_csv_filepath './evaluation/llm_as_judge/{agent_model}_judged_by_{llm_judge}.csv' # Path for LLM as judge scores

compute_traditional_metrics:
  gt_path: *gt_path
  gen_path: *gen_path
  output_filepath: *traditional_metrics_csv_path

plot_traditional_metrics:
  csv_filepath: *traditional_metrics_csv_path
  output_folder_path: './evaluation/plots/graph_rag_gemini-2.5-flash' # Path to the folder where boxplots and violin plots of the evaluation metrics should be saved

run_llm_as_judge:
  model: *llm_judge # Name of the LLM to be used as judge
  temperature: 0.1 # Temprature parameter of the LLM judge
  text_path:  './evaluation/data' # Path to the folder that contains the text files of the Bekanntmachungen to be evaluated
  gt_path: *gt_path
  gen_path: *gen_path
  csv_output_filepath: *llm_scores_csv_filepath

compute_overall_llm_judge_scores:
  judge_scores_csv_path: *llm_scores_csv_filepath
  scoring_weights:
    correctness: 0.35
    completness: 0.35
    clarity: 0.1
    conciseness: 0.1
    adherence: 0.1
  output_csv_path: './evaluation/llm_as_judge/{agent_model}_judged_by_{llm_judge}_overall_scores.csv'

compute_spearman_correlations:
  llm_judge_scores_csv_path: *llm_scores_csv_filepath
  human_scores_csv_path: './evaluation/llm_as_judge/{agent_model}_judged_by_human.csv'
  output_csv_path: './evaluation/llm_as_judge/{agent_model}_human_vs_{llm_judge}_spearman_correlations.csv'